      AFL-0215 lint will reject it.

  - id: AFL-0215
    title: CI lint — direct ability grants / Health writes / server viewpoint
    discipline: devops
    estimate: M
    autonomy: full
    branch: yolo/afl-0215-ci-lint-rule
    depends_on: [AFL-0108]
    verify: none
    plugins_to_build: []
    skills:
      - afl-build-operator
    files_hint:
      - Tools/AFL_Lint/afl_arch_lint.py
      - .github/workflows/afl-pr-build.yml
    aik_brief: |
      NOTE: the afl_yolo bootstrap already encodes the AFL-0215 rules in
      Tools/AFL_Yolo/orchestrator.py (LINT_RULES). This task lifts those same
      rules into a standalone Tools/AFL_Lint/afl_arch_lint.py that runs as a
      required PR check — so direct manual commits (not via yolo) also get
      caught.

      The standalone script:
      - Accepts --root, --base-ref, --changed-files.
      - Re-uses the regex patterns from orchestrator.LINT_RULES (refactor
        them into a shared module if you prefer, but a copy is acceptable
        for now and keeps yolo standalone).
      - Returns non-zero on any violation with a clear path:line: message.

      Wire it into .github/workflows/afl-pr-build.yml as job
      `afl-arch-lint`; make it required.

