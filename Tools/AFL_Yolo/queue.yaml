      - .github/workflows/afl-pr-build.yml
    aik_brief: |
      Author a Python script that validates AFL asset naming conventions
      (see master doc Sec. 3.4) and wire it into the PR pipeline from
      AFL-0108.

      Validation rules:
      - All files under Content/ have an AFL-style prefix:
          BP_ ABP_ AnimBP_ A_ M_ MI_ MF_ M_AFL_ SK_ SM_ T_ NS_ NSE_ MS_
          DA_ DT_ CT_ GE_ AS_ IA_ IC_ (extend as needed; match prevailing
          assets in the repo).
      - All C++ classes follow A/U prefix and contain AFL in the name
        for AFL-owned types.
      - .uplugin files match their containing directory name.

      The script should exit non-zero with a clear report of violators when
      run as `python Tools/AFL_Lint/asset_naming.py --root .`.

      Add a job `afl-naming-lint` to .github/workflows/afl-pr-build.yml that
      runs this on every PR. Make it required.

