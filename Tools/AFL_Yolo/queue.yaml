  aik_brief: "Extend the AFL-0111 QA template into a full regression matrix\ncovering the combined Pulse + Beam + Heat surface. Two deliverables:\n\n1. Docs/QA/AFL-0210_PulseBeamHeat_Regression.md — instance test plan\n   following the AFL-0111 template (AFL_TEST_PLAN_TEMPLATE.md). One\n   row per scenario; columns: id, setup, steps, expected, actual,\n   pass/fail, notes. Cover:\n\n   PULSE (AFL-0104 / 0105 / 0106 / 0107):\n     P01  Single Pulse to target dummy applies 18 damage, AFL_PULSE\n          log fires, hitconfirm widget pulses.\n     P02  Cooldown.Weapon.Pulse blocks re-fire within 1s.\n     P03  Pulse at out-of-range target (>50m) produces a 'miss' log\n          (AFL_TELEMETRY: hitscan_reject reason=range).\n     P04  Pulse aimed past AAFLCharacter into world geometry produces\n          AFL_PULSE: NoHit log.\n     P05  Pulse hit on body-zone head produces gold tint hitmarker\n          and AFL_LOG: hit_confirmed zone=Head.\n\n   BEAM (AFL-0206 / 0208 placeholder VFX):\n     B01  Beam hold for 0.5s produces 5 ticks (50ms grace), each\n          logged AFL_LOG: beam_tick damage=1.2.\n     B02  Beam release applies Cooldown.Weapon.Beam (3s) preventing\n          re-trigger.\n     B03  Beam aim drift across target dummy applies hits per tick;\n          no client-server desync over 50 trials.\n     B04  Beam at out-of-range produces AFL_TELEMETRY: hitscan_reject\n          reason=range per tick.\n\n   HEAT (AFL-0207):\n     H01  Beam hold to overheat (~1.25s) → State.Overheated applies,\n          beam EndAbility, AFL_LOG: heat_overheat fires.\n     H02  Heat decay after 0.5s gate brings Heat below 30 within\n          ~3.5s. State.Overheated clears, beam re-fires.\n     H03  AFL.Combat.ForceOverheat cheat blocks beam activation\n          immediately.\n     H04  Pulse fires NORMALLY during State.Overheated (heat-free\n          per master doc Sec. 5).\n\n   REPLICATION (AFL-0307 mirrored):\n     R01  4-client listen-server, all clients agree on Pulse damage\n          numbers within 0 frames.\n     R02  Beam tick alignment within 100ms across all clients.\n     R03  Heat overheat transition replicates to all observers; non-\n          owning clients see State.Overheated tag on the owner pawn.\n\n2. Docs/QA/AFL_REGRESSION_CHECKLIST.md — short top-level living doc\n   pointing at each per-task regression .md (this AFL-0210 doc, plus\n   AFL-0111's). Future regression plans link from here. Just a\n   markdown index with a bullet per .md and the sprint it covers.\n\nOUT OF SCOPE: actual execution of the matrix (a human runs PIE and\nfills in the actual / pass-fail columns; this task ships the plan,\nnot the run). Dismemberment regression is AFL-0411."
