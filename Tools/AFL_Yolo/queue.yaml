  - Plugins/GameFeatures/AFLCombat/Source/AFLCombat/Public/Targeting/AFLAbilityTargetData_Hitscan.h
  aik_brief: "Implement the hitscan path per master doc Sec. 7 / AFL-0106:\n\n1. Client (predicting): on ActivateAbility,\
    \ perform the line trace\n   locally using the owning camera's view location and rotation. Pack\n   the hit result(s)\
    \ into a custom FGameplayAbilityTargetData subclass\n   (AFLAbilityTargetData_Hitscan) for compactness.\n\n2. Wrap the\
    \ target data in FGameplayAbilityTargetDataHandle and call\n   UAbilitySystemBlueprintLibrary::ServerSetReplicatedTargetData.\
    \ Then\n   WaitTargetData in the ability for the OnTargetDataReady delegate.\n\n3. Server-side ApplyEffect: when the target\
    \ data arrives, apply\n   GE_AFL_Damage_Pulse to the hit target's ASC via\n   ApplyGameplayEffectSpecToTarget. Do NOT\
    \ re-trace from the server's\n   view.\n\nHARD CONSTRAINT: do not call GetPlayerViewPoint on the server. The\nAFL-0215\
    \ lint rule will reject the PR if you do.\n\nAdd a stub for the AFL-0213 telemetry hook: when the server receives\ntarget\
    \ data with an angular velocity above the per-pawn budget\n(placeholder 720 deg/s), log `AFL_TELEMETRY: hitscan_reject\
    \ reason=ang`\nbut do NOT discard the shot yet. Real validation lands in S2 alongside\nUAFLLagCompensationWorldSubsystem\
    \ (AFL-0211)."
  status: merged
