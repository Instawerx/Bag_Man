  aik_brief: "Author UAFLAG_Laser_Beam — the second Lyra-AFL combat ability,\ncomplementary to AFL-0104's UAFLAG_Laser_Pulse. Channeling shape\n(held trigger), tick damage every 0.1s at 1.2 dmg/tick (= 12 dps).\n\nRequirements (mirror AFL-0104 architecture where applicable):\n\n- Extends ULyraGameplayAbility (NOT UGameplayAbility — must keep the\n  Lyra cost/cooldown commit lifecycle).\n- AbilityTag State.Firing.Beam (new — add to AFLCombatTags.ini via\n  UE_DEFINE_GAMEPLAY_TAG_STATIC in the .cpp per the post-2026-05-20\n  CDO crash pattern; do NOT call RequestGameplayTag in the ctor).\n- Replication: LocalPredicted. InstancingPolicy: InstancedPerActor.\n- NetExecutionPolicy: LocalPredicted.\n- Activation: WaitInputRelease task ends the channel. While channeled,\n  Tick at 100ms intervals — re-trace from the firing client's camera\n  via PlayerCameraManager (NOT GetPlayerViewPoint — AFL-0215 lint\n  rejects that), pack target data, ship via\n  CallServerSetReplicatedTargetData. Server applies GE_AFL_Damage_BeamTick\n  per tick.\n- GE_AFL_Damage_BeamTick: Instant GE, Damage meta = 1.2, GrantedTags:\n  Event.Damage.BeamTick on application. Same routing through\n  UAFLDamageExecCalc as the Pulse damage.\n- Add new Cooldown tag Cooldown.Weapon.Beam (placeholder cooldown\n  3s after release; design tunes in S5).\n- Reuse AFLAbilityTargetData_Hitscan for the per-tick target data —\n  don't fork a new struct. Just call ServerSetReplicatedTargetData\n  repeatedly per tick.\n- Telemetry: on each tick that produces damage, call\n  FAFLCombatTelemetry::EmitRejection with a 'beam_tick' reason\n  category (per AFL-0213 stable format) for the rejected case;\n  successful ticks just log AFL_LOG: beam_tick damage=1.2.\n\nHARD CONSTRAINT: no GetPlayerViewPoint, no GiveAbility, no SetHealth.\nAFL-0215 lint will reject violations.\n\nOUT OF SCOPE:\n- Heat consumption per tick (AFL-0207 wires the heat system; this task\n  ships the beam without heat cost).\n- Niagara visual (AFL-0208 ships NS_AFL_PrismBeam).\n- Audio (AFL-0205 handles SFX).\n- Input binding to InputTag.Weapon.SecondaryFire (AFL-0107 follow-up\n  task will bind in a separate PR).\n\nACCEPTANCE: spawn pawn in L_AFL_Arena_Test, console cheat\n'AFL.Combat.GrantBeam' (add this to UAFLCombatCheats; one-line\n addition next to AFL.Combat.Damage), hold LMB-equivalent trigger,\nlog stream shows AFL_LOG: beam_tick damage=1.2 every 100ms. Release\ntrigger: ticks stop, Cooldown.Weapon.Beam tag applied for 3s."
