# afl_yolo queue - BAG MAN (AFL) autonomous build queue.
# Mirrors the Live Build Tracker, but machine-readable.
#
# Lifecycle: pending -> running -> pr_open -> merged | error | skipped
# autonomy:  full | needs_approval | human_only | phase_gate
# verify:    compile | compile+test | compile+cheat-matrix | none

tasks:

  # =========================================================================
  # SPRINT 1 — Pulse weapon end-to-end
  # =========================================================================

  - id: AFL-0104
    title: Stand up UAFLAG_Laser_Pulse ability class
    discipline: eng
    estimate: XL
    autonomy: full
    branch: yolo/afl-0104-ag-laser-pulse
    depends_on: []
    verify: compile
    plugins_to_build: [AFLCombat]
    skills:
      - afl-cpp-lyra-developer
      - unreal-engine-expert
      - afl-build-operator
    files_hint:
      - Plugins/GameFeatures/AFLCombat/Source/AFLCombat/Public/Abilities/AFLAG_Laser_Pulse.h
      - Plugins/GameFeatures/AFLCombat/Source/AFLCombat/Private/Abilities/AFLAG_Laser_Pulse.cpp
      - Plugins/GameFeatures/AFLCombat/Source/AFLCombat/AFLCombat.Build.cs
    aik_brief: |
      Create UAFLAG_Laser_Pulse extending ULyraGameplayAbility. This is the
      foundation for AFL-0105 / AFL-0106 (damage GE + TargetData hitscan).

      Requirements:
      - Activate on InputTag.Weapon.Fire (binding lands in AFL-0107; for now
        just declare the AbilityTag State.Firing.Pulse and the activation hook).
      - Replication policy: LocalPredicted.
      - NetExecutionPolicy: LocalPredicted.
      - InstancingPolicy: InstancedPerActor.
      - Declare TSubclassOf<UGameplayEffect> DamageEffectClass exposed to BP
        (set to nullptr default — wired in AFL-0105).
      - Implement ActivateAbility skeleton that commits cost/cooldown and
        stubs out the trace dispatch (the trace itself is AFL-0106 work). The
        skeleton MUST log `AFL_PULSE: Activate` on commit so we can verify.
      - Add Cooldown tag Cooldown.Weapon.Pulse to AFLCoreTags.ini under the
        AFLCombat plugin's Config/Tags/AFLCombatTags.ini (create the file if
        missing; use the GameplayTagList= form per master doc Sec. 14.5).
      - Cost: a placeholder InstantGE that does nothing — we'll wire heat in
        AFL-0207. Reference but do not implement.

      Out of scope (DO NOT touch):
      - Hitscan trace logic (AFL-0106)
      - Damage GE definition (AFL-0105)
      - Input binding (AFL-0107)
      - Niagara/audio (AFL-0201..0205)

  - id: AFL-0105
    title: Wire GE_AFL_Damage_Pulse + GE_AFL_EnergyGain_Small
    discipline: eng
    estimate: M
    autonomy: full
    branch: yolo/afl-0105-pulse-damage-ge
    depends_on: [AFL-0104]
    verify: compile+cheat-matrix
    cheat_matrix:
      - AFL.Combat.Damage 18
      - AFL.Combat.EnergyGain 10
    plugins_to_build: [AFLCombat]
    skills:
      - afl-cpp-lyra-developer
      - unreal-engine-expert
    files_hint:
      - Plugins/GameFeatures/AFLCombat/Content/Effects/GE_AFL_Damage_Pulse.uasset
      - Plugins/GameFeatures/AFLCombat/Content/Effects/GE_AFL_EnergyGain_Small.uasset
    aik_brief: |
      Author two Instant GameplayEffects:

      1) GE_AFL_Damage_Pulse
         - Duration: Instant
         - Modifier: Damage meta attribute, Override magnitude 18 (this hits
           UAFLDamageExecCalc which then routes through Armor -> Shield ->
           Health per master doc Sec. 8.3).
         - GrantedTags: Event.Damage.Pulse on application.

      2) GE_AFL_EnergyGain_Small
         - Duration: Instant
         - Modifier: CarriedEnergy meta (will exist after AFL-0701 — for now
           leave the modifier list empty and gate the asset behind a #if
           WITH_AFL_ENERGY_SET. The orchestrator's cheat matrix expects an
           OK token regardless, so the cheat manager should log
           `AFLCombatCheats: OK EnergyGain` even when no-op.)

      Wire DamageEffectClass on UAFLAG_Laser_Pulse to GE_AFL_Damage_Pulse via
      a default sub-object set in C++ or via the data asset that ships the
      ability in AFL-0214 (whichever you encounter first — match prevailing
      style).

      Acceptance: console cheats `AFL.Combat.Damage 18` and
      `AFL.Combat.EnergyGain 10` both log `AFLCombatCheats: OK <Name>`.

  - id: AFL-0106
    title: Hitscan via client TargetData (no server view point)
    discipline: eng
    estimate: L
    autonomy: full
    branch: yolo/afl-0106-targetdata-hitscan
    depends_on: [AFL-0104, AFL-0105]
    verify: compile
    plugins_to_build: [AFLCombat]
    skills:
      - afl-cpp-lyra-developer
      - unreal-engine-expert
    files_hint:
      - Plugins/GameFeatures/AFLCombat/Source/AFLCombat/Private/Abilities/AFLAG_Laser_Pulse.cpp
      - Plugins/GameFeatures/AFLCombat/Source/AFLCombat/Public/Targeting/AFLAbilityTargetData_Hitscan.h
    aik_brief: |
      Implement the hitscan path per master doc Sec. 7 / AFL-0106:

      1. Client (predicting): on ActivateAbility, perform the line trace
         locally using the owning camera's view location and rotation. Pack
         the hit result(s) into a custom FGameplayAbilityTargetData subclass
         (AFLAbilityTargetData_Hitscan) for compactness.

      2. Wrap the target data in FGameplayAbilityTargetDataHandle and call
         UAbilitySystemBlueprintLibrary::ServerSetReplicatedTargetData. Then
         WaitTargetData in the ability for the OnTargetDataReady delegate.

      3. Server-side ApplyEffect: when the target data arrives, apply
         GE_AFL_Damage_Pulse to the hit target's ASC via
         ApplyGameplayEffectSpecToTarget. Do NOT re-trace from the server's
         view.

      HARD CONSTRAINT: do not call GetPlayerViewPoint on the server. The
      AFL-0215 lint rule will reject the PR if you do.

      Add a stub for the AFL-0213 telemetry hook: when the server receives
      target data with an angular velocity above the per-pawn budget
      (placeholder 720 deg/s), log `AFL_TELEMETRY: hitscan_reject reason=ang`
      but do NOT discard the shot yet. Real validation lands in S2 alongside
      UAFLLagCompensationWorldSubsystem (AFL-0211).

