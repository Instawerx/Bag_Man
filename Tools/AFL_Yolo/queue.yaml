  aik_brief: "Implement lag compensation per master doc Sec. 7 L3:\n\n- UWorldSubsystem `UAFLLagCompensationWorldSubsystem`\
    \ collects a 60Hz\n  ring buffer of every relevant pawn's hitbox transforms for the last\n  1.2 seconds.\n- `UAFLPawnHitboxHistoryComponent`\
    \ per pawn samples each hitbox bone\n  and pushes into the subsystem buffer.\n- API: `RewindWorldFor(APlayerController*,\
