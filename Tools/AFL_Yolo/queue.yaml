      - afl-ui-hud-design
    files_hint:
      - Plugins/GameFeatures/AFLCombat/Content/Input/IA_AFL_Fire.uasset
      - Plugins/GameFeatures/AFLCombat/Content/Input/DA_AFL_InputConfig_Combat.uasset
    aik_brief: |
      Bind InputTag.Weapon.Fire to UAFLAG_Laser_Pulse via a ULyraInputConfig
      data asset.

      - Create IA_AFL_Fire (InputAction, digital, Triggered+Started).
      - Create or update DA_AFL_InputConfig_Combat to map InputTag.Weapon.Fire
        -> IA_AFL_Fire.
      - Register the input config on the Hero component when the AFLCombat
        Game Feature activates — extend UAFLHeroComponent (will be authored
        in AFL-0214; for this task add only the input config asset and the
        ULyraInputConfig entry. Wiring the component is AFL-0214's job).

      Verify locally that the InputTag.Weapon.Fire tag still exists in
      AFLCoreTags.ini. If not, halt — that's a regression from Sprint 1.

  - id: AFL-0108
    title: GitHub Actions Win64 Development build on every PR
    discipline: devops
    estimate: M
    autonomy: full
    branch: yolo/afl-0108-ci-pr-build
    depends_on: []
    verify: none
    plugins_to_build: []
    skills:
      - afl-build-operator
      - afl-qa-build-recovery
    files_hint:
      - .github/workflows/afl-pr-build.yml
    aik_brief: |
      NOTE: the afl_yolo bootstrap PR already ships
      `.github/workflows/afl-yolo-pr.yml`, which validates yolo branches
      specifically. This task adds the broader PR pipeline that runs on
      every PR (not just yolo branches).

      Author `.github/workflows/afl-pr-build.yml`:
      - Triggers: pull_request to main; push to main.
      - Runs on `[self-hosted, windows, ue5]` (matches the runner pattern in
        the afl-build-operator skill).
      - Steps: checkout (lfs:true), Build.bat LyraEditor Win64 Development
        on `Bag_Man.uproject`, uploads a tail of the build log as an
        artifact on failure.
      - Adds a required status check named `afl-build/win64-dev` so PRs
        cannot merge without it.

      Out of scope: cooking, packaging, shipping builds — those land in S11+
      when we set up the dedicated server pipeline.

  - id: AFL-0109
    title: Asset naming validation script
    discipline: devops
    estimate: M
    autonomy: full
    branch: yolo/afl-0109-asset-naming-lint
    depends_on: [AFL-0108]
    verify: none
    plugins_to_build: []
    skills:
