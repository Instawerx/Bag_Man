  aik_brief: "Add hit-confirmation feedback on the FIRING client when an AFL-0106\nhitscan TargetData lands a damaging hit on a server-resolved target.\n\nThree pieces:\n\n1. UAFLHitConfirmComponent (UActorComponent on the local player\n   controller or pawn). Listens to Lyra's UGameplayMessageSubsystem\n   for a new Event.Damage.Confirmed message broadcast by\n   UAFLDamageExecCalc when EffectiveDamage > 0. On message receipt:\n   - Trigger a UCameraShakeBase via PlayerController.ClientStartCameraShake\n     (subclass: UAFLCameraShake_HitConfirm, peak amplitude small,\n     duration 80ms — feel-tuned later).\n   - Broadcast a multicast delegate OnHitConfirmed(FAFLHitConfirmInfo)\n     for HUD/widget consumption. Info struct carries: damage amount,\n     was-headshot bool (from FHitResult.BoneName per AFL-0411 zone\n     map), distance.\n\n2. WBP_AFL_HitMarker (UMG widget). Subclass of UCommonUserWidget per\n   the Lyra HUD pattern. Bound to UAFLHitConfirmComponent's\n   OnHitConfirmed via Lyra UI binding. Plays a 120ms scale+fade-in\n   animation on the crosshair-center reticle. Headshot variant\n   tinted gold (placeholder color; design tunes in S5).\n\n3. Wire the UMG into the existing Lyra HUD layout via the AFLCombat\n   game-feature's HUD Action Set (LAS_AFL_HUD pattern — author the\n   action set if it doesn't exist; reference LAS_AFL_HeroComponents\n   for the layout).\n\nUAFLDamageExecCalc change required (in scope): on the post-shield\nspillover when EffectiveDamage > 0, broadcast Event.Damage.Confirmed\nvia Lyra's UGameplayMessageSubsystem with the FHitResult and damage\namount in the payload. Do NOT broadcast on EffectiveDamage <= 0 —\nthat's the existing AFL-0213 'mitigated' reject path.\n\nACCEPTANCE: PIE on Content/AFL/Maps/L_AFL_Arena_Test, fire Pulse at\nthe AAFLCharacter target dummy. Crosshair pulses, light camera shake\nfires, AFL_LOG: hit_confirmed damage=18 zone=Torso appears in Output\nLog. Headshot fire (aim at head bone) tints gold.\n\nOUT OF SCOPE: damage numbers (DamageNumber popups land in AFL-0204b\nlater); audio (AFL-0205 owns SFX_AFL_HitConfirm); proper headshot\nmultiplier (AFL-0411 wires up to the body-zone enum)."
