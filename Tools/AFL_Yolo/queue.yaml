  # =========================================================================
  # SPRINT 2 — early enablers that pair with the YOLO bootstrap
  # =========================================================================

  - id: AFL-0211
    title: UAFLLagCompensationWorldSubsystem + per-pawn snapshot component
    discipline: eng
    estimate: XL
    autonomy: full
    branch: yolo/afl-0211-lag-comp-subsystem
    depends_on: [AFL-0106]
    verify: compile
    plugins_to_build: [AFLCombat]
    skills:
      - afl-cpp-lyra-developer
      - unreal-engine-expert
    files_hint:
      - Plugins/GameFeatures/AFLCombat/Source/AFLCombat/Public/LagComp/AFLLagCompensationWorldSubsystem.h
      - Plugins/GameFeatures/AFLCombat/Source/AFLCombat/Public/LagComp/AFLPawnHitboxHistoryComponent.h
    aik_brief: |
      Implement lag compensation per master doc Sec. 7 L3:

      - UWorldSubsystem `UAFLLagCompensationWorldSubsystem` collects a 60Hz
        ring buffer of every relevant pawn's hitbox transforms for the last
        1.2 seconds.
      - `UAFLPawnHitboxHistoryComponent` per pawn samples each hitbox bone
        and pushes into the subsystem buffer.
      - API: `RewindWorldFor(APlayerController*, float ServerTime)` returns
        an opaque rewind token; `RestoreWorld(Token)` undoes it. Must be
        re-entrant safe.
      - Verification: a server-side hit confirmation pass calls
        RewindWorldFor before performing the bounding-box check, then
        Restore unconditionally in a scope guard.

