  files_hint:
  - Plugins/GameFeatures/AFLCombat/Source/AFLCombat/Public/Attributes/AFLAttributeSet_Combat.h
  - Plugins/GameFeatures/AFLCombat/Source/AFLCombat/Private/Attributes/AFLAttributeSet_Combat.cpp
  - Plugins/GameFeatures/AFLCombat/Content/Effects/GE_AFL_Heat_BeamTick.uasset
  - Plugins/GameFeatures/AFLCombat/Content/Effects/GE_AFL_Heat_Decay.uasset
  aik_brief: "Add the Heat economy that gates sustained-fire weapons (Beam\nprimarily; Pulse is heat-free per master doc Sec. 5).\n\nAttribute additions on UAFLAttributeSet_Combat (per the schema\nlocked in master doc Sec. 8):\n\n- Heat                — persistent, replicated, OnRep_Heat, clamp [0..MaxHeat]\n- MaxHeat             — persistent, replicated, OnRep_MaxHeat (default 100)\n- HeatDecayRate       — persistent, replicated (default 20/s, applied\n                        when not firing for 0.5s)\n- HeatPerBeamTick     — meta (cleared in PostGameplayEffectExecute,\n                        same pattern as Damage)\n\nUse ATTRIBUTE_ACCESSORS, GAMEPLAYATTRIBUTE_REPNOTIFY, PreAttributeChange\nclamping. PostGameplayEffectExecute zeros HeatPerBeamTick after the\nGE applies.\n\nState.Overheated tag (NEW — add via UE_DEFINE_GAMEPLAY_TAG_STATIC):\n\n- Apply via GE_AFL_Heat_BeamTick when Heat reaches MaxHeat (granted\n  tag with infinite duration, cleared by a GE_AFL_Heat_VentingComplete\n  that ticks Heat down and removes the tag at Heat <= MaxHeat * 0.3).\n- AFL-0206 UAFLAG_Laser_Beam must check ActivationBlockedTags includes\n  State.Overheated. If Overheated, the beam cannot start; if it\n  becomes Overheated mid-channel, EndAbility immediately.\n\nGE_AFL_Heat_BeamTick (new Instant GE):\n  Modifier: HeatPerBeamTick meta, Add +4.0 per tick (12.5 ticks to\n  overheat from 0 → 100 at 1 tick/100ms = 1.25 seconds of held fire).\n  Apply alongside GE_AFL_Damage_BeamTick from UAFLAG_Laser_Beam's tick\n  delegate. Routes through UAFLDamageExecCalc-style handling.\n\nGE_AFL_Heat_Decay (new Duration GE, infinite):\n  Periodic 0.1s: Modifier Heat -= HeatDecayRate * 0.1 (default -2 per\n  100ms = -20/s). Gated by a 0.5s 'cooling down' delay after last fire\n  tick — implement via a one-shot Duration GE GE_AFL_Heat_CoolingGate\n  (0.5s) granted on every beam tick; while present, Decay's\n  ApplicationTagRequirements.IgnoreTags includes State.Combat.CoolingGate.\n\nNew gameplay tags (add to AFLCombatTags.ini via\nUE_DEFINE_GAMEPLAY_TAG_STATIC in the .cpp pairs):\n  State.Overheated\n  State.Combat.CoolingGate\n  Event.Combat.HeatVentingStart\n  Event.Combat.HeatVentingComplete\n\nUAFLCombatCheats additions:\n  AFL.Combat.Heat <amount>    — set Heat directly\n  AFL.Combat.ForceOverheat    — set Heat = MaxHeat, apply State.Overheated\n  AFL.Combat.ResetHeat        — clear Heat + State.Overheated\n\nHARD CONSTRAINT: no direct SetHealth or SetHeat; mutations route through\nGEs only (AFL-0215 lint rule 2 extended in spirit — Heat is the same\nkind of attribute as Health).\n\nACCEPTANCE: PIE on L_AFL_Arena_Test. Console cheat\n'AFL.Combat.GrantBeam' then hold trigger 1.5s → Heat reaches 100,\nState.Overheated applies, beam ends. After ~3.5s (0.5s gate + 2.0s\ndecay) Heat drops below 30, State.Overheated clears, beam re-fires.\nLog stream shows AFL_LOG: heat_overheat and AFL_LOG: heat_vented at\nthe transitions.\n\nOUT OF SCOPE: per-weapon heat curves (S5 tuning); heat HUD widget\n(AFL-0204b followup); audio for venting (AFL-0205 owns the SFX)."
  status: pending
