    aik_brief: |
      Author the Lyra init contract per master doc Sec. 9:

      - DA_AFL_PawnData_Hero_Default (ULyraPawnData) referencing the Lyra
        default skeletal mesh for now, with InputConfig = IC_AFL_Default and
