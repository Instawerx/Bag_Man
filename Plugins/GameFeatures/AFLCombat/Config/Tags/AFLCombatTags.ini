[/Script/GameplayTags.GameplayTagsList]

; ─────────────────────────────────────────────────────────────
; State.Firing — transient pawn state while a weapon ability is
; mid-execution. Granted by the ability, cleared on EndAbility.
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="State.Firing.Pulse",DevComment="UAFLAG_Laser_Pulse is mid-execution (granted while ability is active)")
GameplayTagList=(Tag="State.Firing.Beam",DevComment="UAFLAG_Laser_Beam is channeling (granted between Activate and input release) (AFL-0206)")

; ─────────────────────────────────────────────────────────────
; Cooldown.Weapon — cooldown gates applied by GameplayEffects.
; One tag per weapon ability that has a cooldown.
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="Cooldown.Weapon.Pulse",DevComment="Pulse weapon cooldown gate (consumed by UAFLAG_Laser_Pulse cooldown GE; wired in AFL-0214)")
GameplayTagList=(Tag="Cooldown.Weapon.Beam",DevComment="Beam weapon cooldown gate (consumed by UAFLAG_Laser_Beam cooldown GE; placeholder 3s, designer-tuned in S5) (AFL-0206)")

; ─────────────────────────────────────────────────────────────
; Event.Damage — verb tags granted on damage GE application.
; Listeners (FX, audio, AFL-0213 telemetry) subscribe by tag.
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="Event.Damage.Pulse",DevComment="Granted by GE_AFL_Damage_Pulse on application (AFL-0105)")
GameplayTagList=(Tag="Event.Damage.BeamTick",DevComment="Granted by GE_AFL_Damage_BeamTick per tick on application (AFL-0206)")
GameplayTagList=(Tag="Event.Damage.Confirmed",DevComment="Broadcast by UAFLDamageExecCalc when EffectiveDamage > 0. Consumed by UAFLHitConfirmComponent for crosshair pulse + camera shake (AFL-0204)")

; ─────────────────────────────────────────────────────────────
; State.Overheated / State.Combat.* — heat-system pawn states.
; Overheated is granted by GE_AFL_Heat_BeamTick when Heat hits
; MaxHeat and blocks Beam re-activation; CoolingGate gates the
; passive decay for 0.5s after every heat-producing tick.
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="State.Overheated",DevComment="Pawn is overheated; blocks sustained-fire ability activation and ends an in-progress beam (AFL-0207)")
GameplayTagList=(Tag="State.Combat.CoolingGate",DevComment="0.5s suppression of GE_AFL_Heat_Decay following the most recent heat-producing tick (AFL-0207)")

; ─────────────────────────────────────────────────────────────
; Event.Combat.HeatVenting* — verb tags broadcast at the
; overheat / vent boundaries. Listeners (HUD pulse, audio cue)
; subscribe via tag rather than coupling to Heat directly.
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="Event.Combat.HeatVentingStart",DevComment="Granted by GE_AFL_Heat_BeamTick on the tick that pushes Heat to MaxHeat (AFL-0207)")
GameplayTagList=(Tag="Event.Combat.HeatVentingComplete",DevComment="Broadcast when Heat decays below MaxHeat*0.3 and State.Overheated clears (AFL-0207)")

; ─────────────────────────────────────────────────────────────
; Data.Combat — SetByCaller magnitude tags consumed by GEs in
; the AFLCombat plugin. Heat is the cheat-only SetByCaller tag
; that GE_AFL_Heat_SetByCaller reads at apply time.
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="Data.Combat.Heat",DevComment="SetByCaller magnitude consumed by GE_AFL_Heat_SetByCaller (cheat path) (AFL-0207)")

; ─────────────────────────────────────────────────────────────
; GameplayCue.Weapon — cosmetic cues broadcast by weapon
; abilities at fire/impact. Received by GCN_AFL_* assets that
; play Niagara + sound + force feedback.
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="GameplayCue.Energy.Overdrive",DevComment="LOOPING body cue while State.Energy.Overdrive holds (attached to UAFLGE_OverdriveBuff; OnRemove is the cleanup site per the looping-cue doctrine). Received by GC_Energy_Overdrive. Energy cycle 2 -- the first body-buff cue.")
GameplayTagList=(Tag="GameplayCue.Weapon.Pulse.Fire",DevComment="Muzzle cue fired by UAFLAG_Laser_Pulse::ClientPredictAndSend on local fire; received by GCN_AFL_Pulse_Fire (AFL-0301)")
GameplayTagList=(Tag="GameplayCue.Weapon.Pulse.Tracer",DevComment="Tracer cue fired by UAFLAG_Laser_Pulse::OnTargetDataReadyCallback post-trace; received by GCN_AFL_Pulse_Tracer (AFL-0302)")

; ─────────────────────────────────────────────────────────────
; GameplayCue.Weapon.Laser — cosmetic cues for the laser/beam
; system (afl-laser-beam-system skill). Played by GCN_AFL_Laser_*
; assets (in /Game/GameplayCues/, scanned) parented to the AFLVFX
; cue notify classes. Beam=looping (channeled), the rest burst.
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="GameplayCue.Weapon.Laser.Beam",DevComment="Looping beam cue added by UAFLAG_Laser_Beam on activate / removed on end; received by GCN_AFL_Laser_Beam (AAFLCueNotify_LaserBeam) (AFL-0208)")
GameplayTagList=(Tag="GameplayCue.Weapon.Laser.BeamFlash",DevComment="Hitscan muzzle->impact flash (burst); received by GCN_AFL_Laser_BeamFlash (AAFLCueNotify_LaserBeamFlash)")
GameplayTagList=(Tag="GameplayCue.Weapon.Laser.Impact",DevComment="Impact spark at the hit point (burst); received by GCN_AFL_Laser_Impact (AAFLCueNotify_LaserImpact)")
GameplayTagList=(Tag="GameplayCue.Weapon.Laser.Muzzle",DevComment="Muzzle/charge orb for OrbType laser weapons (burst); GCN TBD")
