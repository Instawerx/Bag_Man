; S4-INC4 (AFL-0408): PERSISTENT severed-STATE cues -- distinct from the transient .HeadPop/.LeftArm
; pop cues above. These are ADDED (AddGameplayCue, not Executed) server-side at sever and REMOVED at
; restore, so the tag's PRESENCE in the replicated minimal-cue container == "this zone is severed".
; GAS replicates that container (Mixed mode) -> the severed STATE replicates to all clients + late-join
; for free. A single C++ UAFLCueNotify_ZoneSever handles the PARENT .State tag: OnActive hides the bone
; on the visible mesh (all clients), OnRemove un-hides it. The hide is persistent STATE, so it must ride
; the persistent cue container (a one-shot Execute cue would miss late-join/relevancy-rejoin).
GameplayTagList=(Tag="GameplayCue.Combat.Dismember.State",DevComment="S4-INC4 parent of the persistent severed-state cues; the C++ UAFLCueNotify_ZoneSever registers on THIS tag and catches every .State.<Zone> child (GAS routes to the nearest-parent notify). Not added directly.")
GameplayTagList=(Tag="GameplayCue.Combat.Dismember.State.Head",DevComment="S4-INC4 (AFL-0408) PERSISTENT: present in the cue container while the head is severed. AddGameplayCue at decap / RemoveGameplayCue at reattach (server-auth). UAFLCueNotify_ZoneSever::OnActive hides the head bone on the visible CharacterPart mesh on ALL clients; OnRemove un-hides. Replicated severed-state (late-join safe).")
GameplayTagList=(Tag="GameplayCue.Combat.Dismember.State.LeftArm",DevComment="S4-INC4 PERSISTENT severed-state for the left arm (AddGameplayCue at sever / RemoveGameplayCue at restore). UAFLCueNotify_ZoneSever hides/un-hides the bone all-client.")
GameplayTagList=(Tag="GameplayCue.Combat.Dismember.State.RightArm",DevComment="S4-INC4 PERSISTENT severed-state for the right arm. UAFLCueNotify_ZoneSever hides/un-hides all-client.")
GameplayTagList=(Tag="GameplayCue.Combat.Dismember.State.LeftLeg",DevComment="S4-INC4 PERSISTENT severed-state for the left leg. UAFLCueNotify_ZoneSever hides/un-hides all-client.")
GameplayTagList=(Tag="GameplayCue.Combat.Dismember.State.RightLeg",DevComment="S4-INC4 PERSISTENT severed-state for the right leg. UAFLCueNotify_ZoneSever hides/un-hides all-client.")

; ─────────────────────────────────────────────────────────────
; State.Dismembered — S4-INC1 dismemberment-consequence pawn states. Granted by a
; zone row's FAFLDismemberZone.ConsequenceGE; consumed by the matching consequence
; vehicle. Leg = the speed penalty; Arm = the recoil-multiplier attribute.
; S4-INC3 PHASE B-1: the HEAD is NO LONGER lethal-cosmetic -- decapitation is a SURVIVABLE
; state change (3 head shots -> head pops with ZERO body damage). State.Decapitated is its
; consequence tag (below), granted on head-sever, removed by RestoreZone(Head) on retrieve.
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="State.Dismembered.LeftLeg",DevComment="Left leg severed; consumed by UAFLDismemberLegPenaltyComponent (MaxWalkSpeed x SeveredLegSpeedScale). Granted by the LeftLeg row's ConsequenceGE (AFL-0407/leg-consequence vehicle, S4-INC1).")
GameplayTagList=(Tag="State.Dismembered.RightLeg",DevComment="Right leg severed; consumed by UAFLDismemberLegPenaltyComponent. Granted by the RightLeg row's ConsequenceGE. Both leg tags drive one penalty (refcount-aware).")
GameplayTagList=(Tag="State.Dismembered.LeftArm",DevComment="Left arm severed; consumed by the Pulse fire path (RecoilMultiplier attribute x1.5). Granted by the LeftArm row's ConsequenceGE (AFL-0409, S4-INC2).")
GameplayTagList=(Tag="State.Dismembered.RightArm",DevComment="Right arm severed; consumed by the Pulse fire path (RecoilMultiplier x1.5). Granted by the RightArm row's ConsequenceGE. Both arm GEs aggregate additively in GAS Multiply channel 0 -> both arms = x2.0, not x2.25.")
GameplayTagList=(Tag="State.Decapitated",DevComment="Head severed -- SURVIVABLE state (S4-INC3 PHASE B-1). Granted on head zone-HP depletion; keys ULyraCameraMode_AFLDecapitated (an ability with ActivationOwnedTags=State.Decapitated pushes the decap camera). Removed by UAFLDismemberComponent::RestoreZone(Head) when the head loot-box is self-retrieved -> camera auto-pops. NOT a death tag (kill is the normal health bar reaching 0).")

; ─────────────────────────────────────────────────────────────
; Loot.Spawn — loot-cache spawn-point markers (Loot Phase 2 spawn-loop).
; An AAFLLootSpawnPoint carries one of these (FGameplayTag); the director
; (UAFLLootDirectorComponent::SpawnConfiguredCaches) matches each marker
; against a FAFLLootCacheDef::SpawnPointTag (MatchesTag) and spawns that
; def's CacheClass at the marker's transform. Registered here so the
; marker/config tag-pickers offer them + MatchesTag resolves (an
; unregistered tag is empty -> silent no-spawn).
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="Loot.Spawn.Cache.Instant",DevComment="AAFLLootSpawnPoint tag for an INSTANT walk-over cache. The director spawns the INSTANT cache def's CacheClass (AAFLLootCacheInstant) at every marker matching the def's SpawnPointTag.")
GameplayTagList=(Tag="Loot.Spawn.Cache.Carry",DevComment="AAFLLootSpawnPoint tag for a CARRY grab cache. The director spawns the CARRY cache def's CacheClass (BP_AFL_LootCacheCarry) at every marker matching the def's SpawnPointTag.")

; ─────────────────────────────────────────────────────────────
; Channel (Loot-Carry Phase B) -- the reusable timed-channel ability
; (UAFLGameplayAbility_Channel: the CARRY collect-channel now, HARVEST in
; Phase 4). These tags cross the AFLMovement->AFLCombat boundary (the grab
; ability SENDS Event.Loot.CollectChannel; the channel ability TRIGGERS on
; it), so they are registered here per the broadcast/listen-tag-in-ini rule
; -- an unregistered tag is empty -> SendGameplayEvent silently no-fires.
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="State.Channeling",DevComment="Granted by UAFLGE_Channel for the channel lifetime (+ Gameplay.MovementStopped O1 hard-lock). ActivationOwnedTags + ActivationBlockedTags on UAFLGameplayAbility_Channel -> one channel at a time (collect/harvest mutually exclusive). Loot-Carry Phase B.")
GameplayTagList=(Tag="Event.Loot.CollectChannel",DevComment="GameplayEvent the grab ability (UAFLGameplayAbility_Grab) sends for a CollectLoot grabbable (Target = the cache). UAFLAG_CollectChannel's AbilityTriggers activate on it -- Decision D (extract is targetless; the targeted channel carries the cache as event Target-data). Loot-Carry Phase B.")
GameplayTagList=(Tag="Event.Channel.Start",DevComment="Broadcast (FLyraVerbMessage) by UAFLGameplayAbility_Channel on channel start. A future channel-progress HUD subscribes. Loot-Carry Phase B.")
GameplayTagList=(Tag="Event.Channel.Complete",DevComment="Broadcast by UAFLGameplayAbility_Channel on successful channel complete (the subclass payoff already ran). Loot-Carry Phase B.")
GameplayTagList=(Tag="Event.Channel.Interrupted",DevComment="Broadcast by UAFLGameplayAbility_Channel from the EndAbility funnel on every non-complete end (damage / moved past radius / death). Loot-Carry Phase B.")

; ─────────────────────────────────────────────────────────────
; State.Round — round-FSM player states (UAFLRoundManagerComponent).
; ─────────────────────────────────────────────────────────────
GameplayTagList=(Tag="State.Round.NoRespawn",DevComment="Applied to every player's PlayerState ASC for the match (ServerStartMatch -> Server_EndMatch). The cloned GA_AFL_AutoRespawn reads it off the owning ASC and SKIPS its RequestPlayerRestartNextFrame node while present -- tactical model: a mid-round death stays dead (ragdoll death-cam = spectate-out) and the round FSM's round-start force-respawn is the lone respawn authority. Absent outside a round (warmup / match-phase-only mode), so non-round respawn is unaffected.")
