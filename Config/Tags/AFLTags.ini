[/Script/GameplayTags.GameplayTagsList]

; ─────────────────────────────────────────────────────────────
; State — transient pawn state. Mutually-exclusive subsets are
; managed by ability/hero components; tags here are the registry.
; ─────────────────────────────────────────────────────────────
+GameplayTagList=(Tag="State.Combat.Firing",DevComment="Pawn is actively firing a weapon")
+GameplayTagList=(Tag="State.Combat.Reloading",DevComment="Pawn is in the reload animation")
+GameplayTagList=(Tag="State.Combat.Overheated",DevComment="Weapon/ability locked out by heat")
+GameplayTagList=(Tag="State.Movement.Dashing",DevComment="Dash ability is mid-execution")
+GameplayTagList=(Tag="State.Movement.Sliding",DevComment="Slide is mid-execution")
+GameplayTagList=(Tag="State.Movement.Sprinting",DevComment="Sprint speed modifier active")
+GameplayTagList=(Tag="State.Movement.Crouching",DevComment="Pawn is crouched")
+GameplayTagList=(Tag="State.Death",DevComment="Pawn is in death state; abilities should not activate")

; ─────────────────────────────────────────────────────────────
; Ability — gameplay ability identifiers. Used by activation
; tags, blocked-by-tags, and ability-class lookups.
; ─────────────────────────────────────────────────────────────
+GameplayTagList=(Tag="Ability.Laser.Pulse",DevComment="Single-shot laser pulse")
+GameplayTagList=(Tag="Ability.Laser.Beam",DevComment="Sustained laser beam")
+GameplayTagList=(Tag="Ability.Laser.Ricochet",DevComment="Laser bounces between targets")
+GameplayTagList=(Tag="Ability.Laser.Nova",DevComment="Area-of-effect laser burst")
+GameplayTagList=(Tag="Ability.Laser.Singularity",DevComment="Gravitational singularity projectile")
+GameplayTagList=(Tag="Ability.Movement.Dash",DevComment="Directional dash")
+GameplayTagList=(Tag="Ability.Movement.Jump",DevComment="Standard jump")
+GameplayTagList=(Tag="Ability.Movement.DoubleJump",DevComment="Aerial second jump")

; ─────────────────────────────────────────────────────────────
; Cooldown — applied by GameplayEffects to gate reactivation.
; One cooldown tag per ability that has a cooldown.
; ─────────────────────────────────────────────────────────────
+GameplayTagList=(Tag="Cooldown.Laser.Pulse",DevComment="Pulse cooldown gate")
+GameplayTagList=(Tag="Cooldown.Laser.Beam",DevComment="Beam cooldown gate")
+GameplayTagList=(Tag="Cooldown.Laser.Ricochet",DevComment="Ricochet cooldown gate")
+GameplayTagList=(Tag="Cooldown.Laser.Nova",DevComment="Nova cooldown gate")
+GameplayTagList=(Tag="Cooldown.Laser.Singularity",DevComment="Singularity cooldown gate")
+GameplayTagList=(Tag="Cooldown.Movement.Dash",DevComment="Dash cooldown gate")

; ─────────────────────────────────────────────────────────────
; Event — gameplay messages broadcast through the message router
; and AbilitySystemComponent::HandleGameplayEvent. Listened to by
; scoring, accolades, telemetry, and feedback systems.
; ─────────────────────────────────────────────────────────────
+GameplayTagList=(Tag="Event.Hit",DevComment="Any successful damaging hit")
+GameplayTagList=(Tag="Event.Headshot",DevComment="Hit landed on head zone")
+GameplayTagList=(Tag="Event.Elimination",DevComment="Target was eliminated by this damage")
+GameplayTagList=(Tag="Event.EnergyPickup",DevComment="Energy resource collected")
+GameplayTagList=(Tag="Event.Extraction.Start",DevComment="Extraction sequence began")
+GameplayTagList=(Tag="Event.Extraction.Complete",DevComment="Extraction sequence succeeded")
+GameplayTagList=(Tag="Event.Extraction.Failed",DevComment="Extraction sequence failed or was interrupted")
+GameplayTagList=(Tag="Event.Damage.Overkill",DevComment="Damage exceeded OverkillThreshold; dismember system listens")

; ─────────────────────────────────────────────────────────────
; Data — SetByCaller magnitude tags. Carried on GameplayEffects
; to inject runtime multipliers/values at activation time.
; ─────────────────────────────────────────────────────────────
+GameplayTagList=(Tag="Data.Damage.Headshot",DevComment="SetByCaller: headshot multiplier")
+GameplayTagList=(Tag="Data.Damage.Distance",DevComment="SetByCaller: distance falloff multiplier")
+GameplayTagList=(Tag="Data.Damage.Weakpoint",DevComment="SetByCaller: weakpoint multiplier")

; ─────────────────────────────────────────────────────────────
; Telemetry — rejection reasons emitted by server-side validation
; (anti-cheat, hit registration, anti-exploit). Indexes log rows.
; ─────────────────────────────────────────────────────────────
+GameplayTagList=(Tag="Telemetry.Reject.Schema",DevComment="Payload failed schema validation")
+GameplayTagList=(Tag="Telemetry.Reject.Distance",DevComment="Hit exceeded max engagement range")
+GameplayTagList=(Tag="Telemetry.Reject.Origin",DevComment="Reported shot origin does not match server pawn position")
+GameplayTagList=(Tag="Telemetry.Reject.Angle",DevComment="Reported shot angle outside plausible aim cone")
+GameplayTagList=(Tag="Telemetry.Reject.LOS",DevComment="No line of sight from shooter to claimed hit")

; ─────────────────────────────────────────────────────────────
; InputTag — bound to EnhancedInput actions through
; ULyraInputConfig. Drives ability activation and movement.
; ─────────────────────────────────────────────────────────────
+GameplayTagList=(Tag="InputTag.Movement.Move",DevComment="Planar movement axis")
+GameplayTagList=(Tag="InputTag.Movement.Look",DevComment="Look/aim axis")
+GameplayTagList=(Tag="InputTag.Movement.Jump",DevComment="Jump input")
+GameplayTagList=(Tag="InputTag.Movement.Dash",DevComment="Dash input")
+GameplayTagList=(Tag="InputTag.Movement.Crouch",DevComment="Crouch toggle/hold input")
+GameplayTagList=(Tag="InputTag.Movement.Sprint",DevComment="Sprint hold input")
+GameplayTagList=(Tag="InputTag.Weapon.Fire",DevComment="Primary fire input")
+GameplayTagList=(Tag="InputTag.Weapon.Aim",DevComment="Aim-down-sights / focus input")
+GameplayTagList=(Tag="InputTag.Weapon.Reload",DevComment="Reload input")
+GameplayTagList=(Tag="InputTag.Weapon.SwitchPrimary",DevComment="Switch to primary weapon slot")
+GameplayTagList=(Tag="InputTag.Weapon.SwitchSecondary",DevComment="Switch to secondary weapon slot")
+GameplayTagList=(Tag="InputTag.Ability.Ultimate",DevComment="Activate ultimate ability")
+GameplayTagList=(Tag="InputTag.Ability.Interact",DevComment="Context interaction input")
