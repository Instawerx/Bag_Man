

[/Script/AgentIntegrationKit.ACPSettings]
bUseBetaChannel=True
; Use the providers' DIRECT APIs (api.tripo3d.ai, etc.) with our own keys, NOT the
; betide.studio credit proxy. The proxy path returns 404 HTML (proxy not provisioned /
; BetideApiToken empty) which broke ALL generative providers; direct mode + our TripoApiKey works.
bUseBetideCredits=False
; ============================================================================
; API keys (MeshyApiKey, TripoApiKey, OpenRouterApiKey, etc.) MUST NOT live in
; this committed file. Each developer keeps their own keys in:
;     Config/UserAgentIntegrationKit.ini   (gitignored)
;     or environment variables
; AIK reads from both. See Docs/Studio/AIK_KEYS_SETUP.md.
; ============================================================================
bAutoDownloadUpdates=True
bVerboseLogging=True
bAllowBrowserMCPRequests=True

