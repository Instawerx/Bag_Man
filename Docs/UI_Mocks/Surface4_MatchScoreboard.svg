<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"
     font-family="'Chakra Petch','Segoe UI',sans-serif">
  <!-- ===== Surface 4: match-end scoreboard mock (IRONICS_UI_STYLE_SSOT) =====
       Glass UIPanel.Glass: white 0.10 fill + House-Cyan #00F8FF active border, 20px radius, blur.
       Display = Chakra Petch ALL-CAPS; numerics = JetBrains Mono (tabular). HUD hues off the 5 beam hues.
       Renders on PostGame (State.Match.Ended terminal hold). Banner MATCH-COMPLETE line folded in here. -->

  <!-- PostGame freeze backdrop -->
  <rect width="1280" height="720" fill="#05080a"/>
  <rect width="1280" height="720" fill="#0a1a20" opacity="0.45"/>

  <!-- Glass panel -->
  <rect x="160" y="58" width="960" height="604" rx="20" fill="#ffffff" fill-opacity="0.10"
        stroke="#00F8FF" stroke-opacity="0.85" stroke-width="2"/>
  <rect x="160" y="58" width="960" height="604" rx="20" fill="#64b4ff" fill-opacity="0.05"/>

  <!-- Title + outcome + score -->
  <text x="640" y="104" text-anchor="middle" fill="#ffffff" fill-opacity="0.85" font-size="22" letter-spacing="7" font-weight="600">MATCH COMPLETE</text>
  <text x="640" y="166" text-anchor="middle" fill="#00F8FF" font-size="58" font-weight="700" letter-spacing="5">VICTORY</text>
  <text x="640" y="214" text-anchor="middle" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="34" letter-spacing="8">7 - 3</text>
  <text x="640" y="244" text-anchor="middle" fill="#ffffff" fill-opacity="0.45" font-size="14" letter-spacing="3">FINAL ROUND - ELIMINATION</text>

  <!-- ===== TEAM A (yours, cyan) ===== -->
  <rect x="186" y="266" width="908" height="30" rx="6" fill="#00F8FF" fill-opacity="0.14"/>
  <text x="200" y="287" fill="#00F8FF" font-size="17" font-weight="700" letter-spacing="3">TEAM A</text>
  <text x="270" y="287" fill="#ffffff" fill-opacity="0.45" font-size="12" letter-spacing="2">(YOU)</text>
  <text x="1080" y="287" text-anchor="end" fill="#00F8FF" font-family="'JetBrains Mono',monospace" font-size="17" font-weight="700">7</text>

  <!-- column header -->
  <text x="200"  y="320" fill="#ffffff" fill-opacity="0.45" font-size="12" letter-spacing="2">PLAYER</text>
  <text x="648"  y="320" text-anchor="end" fill="#ffffff" fill-opacity="0.45" font-size="12" letter-spacing="1">K</text>
  <text x="716"  y="320" text-anchor="end" fill="#ffffff" fill-opacity="0.45" font-size="12" letter-spacing="1">D</text>
  <text x="784"  y="320" text-anchor="end" fill="#ffffff" fill-opacity="0.45" font-size="12" letter-spacing="1">A</text>
  <text x="950"  y="320" text-anchor="end" fill="#ffffff" fill-opacity="0.45" font-size="12" letter-spacing="1">WATTS EARNED</text>
  <text x="1082" y="320" text-anchor="end" fill="#ffffff" fill-opacity="0.20" font-size="11" letter-spacing="1">EXTRACTED</text>

  <!-- row 1 (local player, highlighted) -->
  <rect x="186" y="330" width="908" height="30" rx="5" fill="#00F8FF" fill-opacity="0.10"/>
  <text x="200"  y="351" fill="#ffffff" font-size="15">VRDIVEBAR</text>
  <text x="648"  y="351" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">14</text>
  <text x="716"  y="351" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">6</text>
  <text x="784"  y="351" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">3</text>
  <text x="950"  y="351" text-anchor="end" fill="#00F8FF" font-family="'JetBrains Mono',monospace" font-size="15">1840</text>
  <text x="1082" y="351" text-anchor="end" fill="#ffffff" fill-opacity="0.18" font-family="'JetBrains Mono',monospace" font-size="14">--</text>
  <!-- row 2 -->
  <text x="200"  y="385" fill="#ffffff" font-size="15">BOT_RHEA</text>
  <text x="648"  y="385" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">9</text>
  <text x="716"  y="385" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">7</text>
  <text x="784"  y="385" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">5</text>
  <text x="950"  y="385" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">1120</text>
  <text x="1082" y="385" text-anchor="end" fill="#ffffff" fill-opacity="0.18" font-family="'JetBrains Mono',monospace" font-size="14">--</text>
  <!-- row 3 -->
  <text x="200"  y="419" fill="#ffffff" font-size="15">BOT_KANE</text>
  <text x="648"  y="419" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">11</text>
  <text x="716"  y="419" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">8</text>
  <text x="784"  y="419" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">2</text>
  <text x="950"  y="419" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">980</text>
  <text x="1082" y="419" text-anchor="end" fill="#ffffff" fill-opacity="0.18" font-family="'JetBrains Mono',monospace" font-size="14">--</text>

  <!-- ===== TEAM B (enemy, neutral red rim) ===== -->
  <rect x="186" y="446" width="908" height="30" rx="6" fill="#ff5050" fill-opacity="0.12"/>
  <text x="200" y="467" fill="#ff7a7a" font-size="17" font-weight="700" letter-spacing="3">TEAM B</text>
  <text x="1080" y="467" text-anchor="end" fill="#ff7a7a" font-family="'JetBrains Mono',monospace" font-size="17" font-weight="700">3</text>

  <text x="200"  y="500" fill="#ffffff" fill-opacity="0.45" font-size="12" letter-spacing="2">PLAYER</text>
  <text x="648"  y="500" text-anchor="end" fill="#ffffff" fill-opacity="0.45" font-size="12">K</text>
  <text x="716"  y="500" text-anchor="end" fill="#ffffff" fill-opacity="0.45" font-size="12">D</text>
  <text x="784"  y="500" text-anchor="end" fill="#ffffff" fill-opacity="0.45" font-size="12">A</text>
  <text x="950"  y="500" text-anchor="end" fill="#ffffff" fill-opacity="0.45" font-size="12">WATTS EARNED</text>
  <text x="1082" y="500" text-anchor="end" fill="#ffffff" fill-opacity="0.20" font-size="11">EXTRACTED</text>

  <text x="200"  y="534" fill="#ffffff" font-size="15">BOT_VEX</text>
  <text x="648"  y="534" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">10</text>
  <text x="716"  y="534" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">11</text>
  <text x="784"  y="534" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">4</text>
  <text x="950"  y="534" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">1010</text>
  <text x="1082" y="534" text-anchor="end" fill="#ffffff" fill-opacity="0.18" font-family="'JetBrains Mono',monospace" font-size="14">--</text>
  <text x="200"  y="568" fill="#ffffff" font-size="15">BOT_NOX</text>
  <text x="648"  y="568" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">8</text>
  <text x="716"  y="568" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">12</text>
  <text x="784"  y="568" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">6</text>
  <text x="950"  y="568" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">760</text>
  <text x="1082" y="568" text-anchor="end" fill="#ffffff" fill-opacity="0.18" font-family="'JetBrains Mono',monospace" font-size="14">--</text>
  <text x="200"  y="602" fill="#ffffff" font-size="15">BOT_IRA</text>
  <text x="648"  y="602" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">7</text>
  <text x="716"  y="602" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">10</text>
  <text x="784"  y="602" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">3</text>
  <text x="950"  y="602" text-anchor="end" fill="#ffffff" font-family="'JetBrains Mono',monospace" font-size="15">540</text>
  <text x="1082" y="602" text-anchor="end" fill="#ffffff" fill-opacity="0.18" font-family="'JetBrains Mono',monospace" font-size="14">--</text>

  <!-- footnote -->
  <text x="200" y="640" fill="#ffffff" fill-opacity="0.40" font-size="12">WATTS EARNED = this-match Watts (kills + extraction).  EXTRACTED column reserved -- Surface-4 option B (per-player stats component).</text>
</svg>
